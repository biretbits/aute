/* ================= DIAGNÓSTICO ================= */

function diagnosticar(){

let seleccion=[...document.querySelectorAll("input:checked")].map(x=>x.value);

let resultados=[];

sensores.forEach(s=>{

let match=[];

seleccion.forEach(sym=>{
if(s.clave.includes(sym)) match.push(sym);
});

if(match.length>0){
resultados.push({...s,score:match.length,match});
}

});

resultados.sort((a,b)=>b.score-a.score);

let html="";

resultados.forEach(r=>{
html+=`
<div class="sensor">
<h5>${r.nombre}</h5>
<div class="codigo">${r.dtc}</div>

<small>Puntaje: ${r.score}</small>

<div class="coins">
Coincidencias: ${r.match.join(", ")}
</div>

<pre>${r.clave_diagnostica}</pre>

</div>`;
});

document.getElementById("resultado").innerHTML =
resultados.length ? html : "Sin coincidencias";
}

</script>
