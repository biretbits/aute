    div.className = "sintoma-item text-capitalize";
    div.innerHTML = `
        <input type="checkbox" value="${s}">
        ${s.replaceAll("_", " ")}
    `;
    contenedorSintomas.appendChild(div);
});

/* ================= LÓGICA DE DIAGNÓSTICO (SUMA) ================= */
function diagnosticar() {

    const seleccionados = [...document.querySelectorAll("input:checked")]
        .map(x => x.value);

    const resultContainer = document.getElementById("resultado_container");

    if (seleccionados.length === 0) {
        resultContainer.innerHTML = `
            <div class='alert alert-warning'>
                Por favor, seleccione al menos un síntoma.
            </div>
        `;
        return;
    }

    let resultados = [];

    // PESOS SEGÚN NIVEL
    const pesoValor = {
        "fuerte": 3,
        "medio": 2,
        "debil": 1,
        "nada": 0
    };

    // Orden de niveles para mostrar dentro del sensor
    const ordenNivel = { "fuerte": 3, "medio": 2, "debil": 1 };

    sensores.forEach(s => {

        let cantidadCoincidencias = 0;
        let puntajeTotal = 0;
        let coincidenciasDetalles = [];

        // CONTADORES ESPECÍFICOS POR NIVEL
        let contadorFuerte = 0;
        let contadorMedio = 0;
        let contadorDebil = 0;

        seleccionados.forEach(sel => {
            if (s.clave.hasOwnProperty(sel)) {
                cantidadCoincidencias++;
                let nivel = s.clave[sel].nivel;
                let comentario = s.clave[sel].comentario;
                let puntos = pesoValor[nivel] || 0;
                puntajeTotal += puntos;

                // Incrementar contador según nivel
                if (nivel === "fuerte") contadorFuerte++;
                else if (nivel === "medio") contadorMedio++;
                else if (nivel === "debil") contadorDebil++;

                coincidenciasDetalles.push({
                    nombre: sel,
                    nivel: nivel.toUpperCase(),
                    comentario: comentario,
                    puntos: puntos
                });
            }
        });

        if (cantidadCoincidencias > 0) {
            // Ordenar los síntomas coincidentes de más fuerte a más débil
            coincidenciasDetalles.sort((a, b) => {
                return (ordenNivel[b.nivel.toLowerCase()] || 0) - (ordenNivel[a.nivel.toLowerCase()] || 0);
            });

            resultados.push({
                ...s,
                cantidadCoincidencias,
                puntajeTotal,
                coincidenciasDetalles,
                contadorFuerte,
                contadorMedio,
                contadorDebil
            });
        }
    });

    // ORDENACIÓN JERÁRQUICA:
    // 1) Más "fuerte" primero (mayor a menor)
    // 2) Si igual, más "medio"
    // 3) Si igual, más "débil"
    // 4) Si igual, mayor puntaje total
    // 5) Si igual, mayor cantidad de coincidencias
    resultados.sort((a, b) => {
        if (a.contadorFuerte !== b.contadorFuerte) {
            return b.contadorFuerte - a.contadorFuerte;
        }
        if (a.contadorMedio !== b.contadorMedio) {
            return b.contadorMedio - a.contadorMedio;
        }
        if (a.contadorDebil !== b.contadorDebil) {
            return b.contadorDebil - a.contadorDebil;
        }
        if (a.puntajeTotal !== b.puntajeTotal) {
            return b.puntajeTotal - a.puntajeTotal;
        }
        return b.cantidadCoincidencias - a.cantidadCoincidencias;
    });

    // MOSTRAMOS TODOS LOS RESULTADOS
    let html = "";

    if (resultados.length === 0) {
        html = `<div class='alert alert-danger'>No se encontraron coincidencias.</div>`;
    } else {
        html = `<h5 class="text-info mb-3">🔎 Todos los sensores con coincidencias (ordenados por relevancia):</h5>`;

        resultados.forEach((r, index) => {
            let bordeColor, etiqueta;
            const pos = index + 1;

            // Asignar color y badge según posición (top 5 destacados, resto genérico)
            if (pos === 1) {
                bordeColor = "#28a745";
                etiqueta = `<span class="badge bg-success text-white mb-2">🏆 1º - MAYOR PROBABILIDAD</span>`;
            } else if (pos === 2) {
                bordeColor = "#ffc107";
                etiqueta = `<span class="badge bg-warning text-dark mb-2">⚠️ 2º OPCIÓN</span>`;
            } else if (pos === 3) {
                bordeColor = "#17a2b8";
                etiqueta = `<span class="badge bg-info text-white mb-2">ℹ️ 3º OPCIÓN</span>`;
            } else if (pos === 4) {
                bordeColor = "#6c757d";
                etiqueta = `<span class="badge bg-secondary text-white mb-2">🔍 4º OPCIÓN</span>`;
            } else if (pos === 5) {
                bordeColor = "#0d6efd";
                etiqueta = `<span class="badge bg-primary text-white mb-2">🔍 5º OPCIÓN</span>`;
            } else {
                bordeColor = "#343a40";
                etiqueta = `<span class="badge bg-dark text-white mb-2">🔧 ${pos}º - POSIBLE CAUSA</span>`;
            }

            // Mostrar resumen de niveles en el badge
            let resumenNiveles = "";
            if (r.contadorFuerte > 0) resumenNiveles += `<span style="color:#28a745;">● ${r.contadorFuerte} fuerte</span> `;
            if (r.contadorMedio > 0) resumenNiveles += `<span style="color:#ffc107;">● ${r.contadorMedio} medio</span> `;
            if (r.contadorDebil > 0) resumenNiveles += `<span style="color:#17a2b8;">● ${r.contadorDebil} débil</span> `;

            html += `
                <div class="sensor-card"
                     style="border-left:6px solid ${bordeColor}; padding:15px; margin-bottom:15px; background:#1e1e2e; border-radius:5px">

                    ${etiqueta}

                    <div class="puntaje-badge mb-2">
                        📊 ${r.cantidadCoincidencias} síntomas coincidentes |
                        Peso total: <strong>${r.puntajeTotal} pts</strong><br>
                        ${resumenNiveles}
                    </div>

                    <h4 class="text-light">${r.nombre}</h4>
                    <div class="codigo-dtc text-info mb-2">Posibles DTC: ${r.dtc}</div>

                    <div class="match-list text-light mb-3">
                        <strong>Coincidencias detectadas (ordenadas por fuerza):</strong><br>
                        ${r.coincidenciasDetalles.map(c => {
                            let nivelBajo = c.nivel.toLowerCase();
                            let colorNivel = nivelBajo === 'fuerte' ? '#28a745' : (nivelBajo === 'medio' ? '#ffc107' : '#17a2b8');
                            return `
                                <div style="background:#27293d; padding:8px; border-radius:5px; margin-bottom:10px; border-left:4px solid ${colorNivel};">
                                    <div>🔹 <strong>${c.nombre}</strong></div>
                                    <div>Nivel: <strong style="color:${colorNivel};">${c.nivel}</strong> (${c.puntos} pts)</div>
                                    <div style="margin-top:5px; color:#d6d6d6;">🧠 ${c.comentario}</div>
                                </div>
                            `;
                        }).join("")}
                    </div>

                    <pre style="background:#27293d; color:#e0e0e0; padding:8px; border-radius:4px; white-space:pre-wrap;">${r.info}</pre>
                </div>
            `;
        });
    }

    resultContainer.innerHTML = html;
}

</script>
