<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Profesional Automotriz AUTEMEC</title>

    <!-- BOOTSTRAP 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0e0f13;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header-info {
            background: #1b1f27;
            padding: 15px;
            border-bottom: 3px solid #00cc88;
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            color: #00ffcc;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .panel {
            background: #1b1f27;
            border-radius: 12px;
            padding: 20px;
            height: 75vh;
            overflow-y: auto;
            border: 1px solid #333;
        }

        /* Personalización de Checkboxes */
        .sintoma-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #2a2e35;
            transition: 0.3s;
            cursor: pointer;
        }

        .sintoma-item:hover {
            background: #252a34;
        }

        .sintoma-item input {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: #00cc88;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 204, 136, 0.3);
            transition: 0.3s;
        }

        button:hover {
            background: #00ffaa;
            transform: translateY(-2px);
        }

        /* Tarjetas de Resultados */
        .sensor-card {
            background: #222;
            margin-bottom: 20px;
            padding: 18px;
            border-radius: 12px;
            position: relative;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .puntaje-badge {
            background: #ff3366;
            color: white;
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: bold;
            float: right;
        }

        .codigo-dtc {
            color: #ffcc00;
            font-family: monospace;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .match-list span {
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 5px;
            display: inline-block;
            margin-top: 5px;
        }

        pre {
            white-space: pre-wrap;
            background: #111;
            color: #ccc;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            border: 1px solid #333;
            margin-top: 10px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header-info">
    <h1>SISTEMA AUTEMEC PRO</h1>
    <h5>Ing. Limbert Lipiri Villca</h5>
    <p class="mb-0 text-secondary">Challapata, Bolivia - Calle La Paz entre Pasaje Linares</p>
</div>

<div class="container-fluid px-4">
    <div class="row g-4">
        <!-- SECCIÓN DE SÍNTOMAS -->
        <div class="col-12 col-lg-5">
            <div class="panel">
                <h4 class="text-info border-bottom pb-2">Selección de Síntomas</h4>
                <div id="sintomas_container"></div>
            </div>
            <button onclick="diagnosticar()">INICIAR DIAGNÓSTICO</button>
        </div>

        <!-- SECCIÓN DE RESULTADOS -->
        <div class="col-12 col-lg-7">
            <div class="panel">

                <h4 class="text-info border-bottom pb-2">Resultados del Análisis</h4>
                <div class="container">
                  Nota: vibrar es mas fuerte y temblor es mas suave y habeses ni se nota
                </div>
                <div id="resultado_container">
                    <p class="text-center text-secondary mt-5">Marque los síntomas del vehículo para ver posibles fallas.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const listaSintomas = [
    // --- Arranque y Apagado ---
    "no_arranca", "arranque_largo", "arranque_dificil", "se_apaga", "apagones_intermitentes",

    // --- Potencia y Marcha ---
    "jalonea", "perdida_potencia", "no_acelera", "modo_emergencia", "falla_en_subida",
    "tironea_acelerando", "se_ahoga", "cascabelea", "tiembla_en_recorrido", "vibra_en_recorrido",
    "limitado_a_3000_rpm", "respuesta_lenta_acelerador", "pedal_no_responde",
    "no_mejora_al_acelerar", "mejora_al_acelerar", "falta_de_fuerza_progresiva",

    // --- Ralentí y Vibraciones ---
    "ralenti_inestable", "ralenti_alto", "ralenti_bajo", "rpm_altas", "rpm_suben_y_bajan",
    "vibra_mucho", "vibracion_ritmica", "motor_cabecea", "tiembla_en_parada",

    // --- Humos y Olores ---
    "humo_negro", "olor_gasolina", "olor_a_huevo_podrido",

    // --- Consumo y Mezcla ---
    "consume_mucho", "mezcla_pobre", "mezcla_rica",

    // --- Temperatura y Refrigeración ---
    "falla_frio", "falla_caliente", "sobrecalentamiento", "ventilador_prendido",
    "electroventilador_no_activa", "electroventilador_siempre_activo", "temperatura_tablero_erratica",

    // --- Ruidos y Explosiones ---
    "explosiones_escape", "explosiones_admision", "cascabeleo_metalico_interno", "ruido_de_canicas",

    // --- Presiones y Sistemas ---
    "baja_presion_combustible", "alta_presion_combustible", "tacometro_no", "caja_golpea",
    "sin_chispa", "sin_inyeccion", "misfire", "senal_erratica", "sincronizacion_perdida",
    "sincronizacion_acelerador", "falla_aceleracion", "avance_atrasado",

    // --- Catalizador y Escape ---
    "convertidor_sobrecalentado", "baja_eficiencia_catalizador",

    // --- Electrónica ---
    "codigo_correlacion_pedal","luz_aceite_encendida", "presion_aceite_baja", "zumbido_motor", "ruido_bielas", "falla_levas", "testigo_rojo", "marca_erratico", "sin_presion",
"enciende_normal_luego_se_apaga","se_apaga_al_detener","falla_intermitente","check_engine","vibracion_se_disimula_al_acelerar"
];const sensores = [
        // --- GRUPO 1: SINCRONIZACIÓN Y TIEMPO ---
        {
            nombre: "Sensor CKP (Cigüeñal)",
            dtc: "P0335 - P0338",
            clave: ["check_engine","falla_intermitente","se_apaga_al_detener","enciende_normal_luego_se_apaga","no_arranca", "sin_chispa", "sin_inyeccion", "tacometro_no", "se_apaga", "apagones_intermitentes", "falla_caliente", "senal_erratica", "arranque_largo", "jalonea", "perdida_potencia", "ralenti_inestable", "misfire", "consume_mucho"],
            info: "LÓGICA: Si falla, la ECU no sabe que el motor gira. El tacómetro en 0 mientras das marcha es la prueba reina."
        },
        {
            nombre: "Sensor CMP (Árbol de Levas)",
            dtc: "P0340 - P0344",
            clave: ["check_engine","falla_intermitente","se_apaga_al_detener","enciende_normal_luego_se_apaga","arranque_largo", "perdida_potencia", "no_arranca", "jalonea", "misfire", "ralenti_inestable", "sincronizacion_perdida", "consumo_alto", "arranque_dificil", "modo_seguro", "falla_en_subida"],
            info: "LÓGICA: Sincroniza la secuencia de inyección. Sin él, la ECU 'adivina' el tiempo, causando pérdida de potencia al exigir carga."
        },

        // --- GRUPO 2: FLUJO Y PRESIÓN DE AIRE ---
        {
            nombre: "Sensor MAF (Flujo de Aire)",
            dtc: "P0100 - P0104",
            clave: ["check_engine","falla_intermitente","vibracion_se_disimula_al_acelerar","enciende_normal_luego_se_apaga","tiembla_en_recorrido", "humo_negro", "jalonea", "se_ahoga", "mezcla_pobre", "mezcla_rica", "perdida_potencia", "consumo_alto", "ralenti_inestable", "se_apaga", "apagones_intermitentes", "respuesta_lenta_acelerador", "arranque_largo", "olor_gasolina", "misfire", "falla_en_subida"],
            info: "LÓGICA: Mide el peso del aire que entra. Si falla, calcula mal la mezcla y el motor pierde fuerza al subir."
        },
        {
              nombre: "Sensor MAP (Presión Absoluta)",
              dtc: "P0105 - P0109",
              clave: ["check_engine","falla_intermitente","se_apaga_al_detener","vibra_en_recorrido", "falla_en_subida", "motor_cabecea", "explosiones_admision", "perdida_potencia", "jalonea", "ralenti_inestable", "consumo_alto", "arranque_dificil", "se_apaga", "humo_negro", "mezcla_pobre", "mezcla_rica", "respuesta_lenta_acelerador", "misfire"],
              info: "LÓGICA: Mide el vacío en el múltiple. Es vital para calcular la mezcla y el avance del encendido, especialmente cuando el motor hace fuerza en subidas."
          },
          {
              nombre: "Sensor IAT (Temperatura de Aire)",
              dtc: "P0110 - P0113",
              clave: ["check_engine","falla_frio", "consume_mucho", "mezcla_rica", "arranque_largo", "ralenti_inestable", "perdida_potencia", "mezcla_pobre", "arranque_dificil", "se_ahoga", "humo_negro", "respuesta_lenta_acelerador", "misfire", "se_apaga"],
              info: "LÓGICA: Mide la temperatura del aire para calcular su densidad. Si marca mal, la ECU ajusta mal la mezcla: en frío le falta gasolina y falla, en caliente puede enriquecer demasiado."
          },
        // --- GRUPO 3: COMBUSTIBLE Y PRESIÓN ---
        {
            nombre: "Sensor FRP (Presión del Riel)",
            dtc: "P0190 - P0193",
            clave: ["check_engine","alta_presion_combustible", "baja_presion_combustible", "modo_emergencia", "jalonea", "no_arranca", "arranque_largo", "perdida_potencia", "se_apaga", "ralenti_inestable", "mezcla_pobre", "mezcla_rica", "misfire", "consumo_alto", "respuesta_lenta_acelerador"],
            info: "LÓGICA: El vigía de la inyección directa/common rail. Si reporta sobrepresión, la ECU corta potencia para evitar roturas."
        },
        {
            nombre: "Inyectores de Combustible (Actuador)",
            dtc: "P0200 - P0204",
            clave: ["check_engine","vibracion_se_disimula_al_acelerar","falla_en_subida","tiembla_en_parada", "olor_gasolina", "humo_negro", "misfire", "perdida_potencia", "consume_mucho", "ralenti_inestable", "explosiones_escape", "arranque_dificil"],
            info: "LÓGICA: Fallo de entrega. Si gotea hay humo negro; si no abre, el motor vibra por cilindro muerto y pierde fuerza en subida."
        },
        {
            nombre: "Bomba de Combustible (Actuador)",
            dtc: "P0087",
            clave: ["check_engine","falla_intermitente","se_apaga_al_detener","falla_en_subida","enciende_normal_luego_se_apaga","baja_presion_combustible", "vibra_en_recorrido", "se_apaga", "perdida_potencia", "jalonea", "arranque_largo", "no_arranca", "motor_cabecea", "se_ahoga", "apagones_intermitentes", "respuesta_lenta_acelerador", "misfire", "consumo_alto"],
            info: "LÓGICA: Falta de caudal. En alta demanda, la presión cae y el motor vibra por hambre de combustible."
        },
        {
            nombre: "Sensor ECT (Temperatura Refrigerante)",
            dtc: "P0115 - P0119",
            clave: ["check_engine","enciende_normal_luego_se_apaga","falla_frio", "falla_caliente", "sobrecalentamiento", "ventilador_prendido", "consume_mucho", "arranque_dificil", "arranque_largo", "humo_negro", "mezcla_rica", "ralenti_inestable", "se_apaga", "temperatura_tablero_erratica", "misfire", "respuesta_lenta_acelerador"],
            info: "LÓGICA: Es el 'estrangulador' electrónico. Si marca siempre frío, el auto se ahoga en gasolina cuando ya calentó."
        },
        {
            nombre: "Sensor de Detonación (Knock)",
            dtc: "P0325",
            clave: ["check_engine","falla_en_subida","cascabelea", "perdida_potencia", "consumo_alto", "misfire", "ralenti_inestable"],
            info: "LÓGICA: Escucha el picado de bielas. Si falla, la ECU no retrasa el tiempo y escuchas sonido metálico al hacer fuerza."
        },
        {
            nombre: "Sonda Lambda (Oxígeno)",
            dtc: "P0130 - P0172",
            clave: ["check_engine","vibracion_se_disimula_al_acelerar","falla_en_subida","enciende_normal_luego_se_apaga","tiembla_en_recorrido", "consume_mucho", "mezcla_rica", "olor_gasolina", "mezcla_pobre", "humo_negro", "ralenti_inestable", "jalonea", "perdida_potencia", "misfire", "arranque_dificil"],
            info: "LÓGICA: Corrige la mezcla en tiempo real. Si se vuelve lenta, causa pérdida de potencia al subir."
        },
        {
            nombre: "Válvula EGR (Actuador)",
            dtc: "P0400 - P0406",
            clave: ["check_engine","falla_en_subida","tiembla_en_parada", "se_apaga", "explosiones_admision", "ralenti_inestable", "perdida_potencia", "jalonea", "motor_cabecea", "se_ahoga", "consumo_alto", "olor_gasolina"],
            info: "LÓGICA: Si se traba abierta, introduce gases quemados en ralentí, asfixiando la combustión y reduciendo la potencia en carga."
        },
        {
            nombre: "Sensor TPS (Posición de Mariposa)",
            dtc: "P0120 - P0124",
            clave: ["check_engine","falla_intermitente","se_apaga_al_detener","enciende_normal_luego_se_apaga","no_acelera", "tironea_acelerando", "jalonea", "rpm_altas", "ralenti_inestable", "aceleracion_erratica", "cambios_bruscos", "se_apaga", "consumo_alto"],
            info: "LÓGICA: Informa cuánto abriste el aire. Si tiene punto muerto, el auto da tirones violentos."
        },
        {
            nombre: "Sensor APP (Pedal Acelerador)",
            dtc: "P2120",
            clave: ["check_engine","pedal_no_responde", "modo_emergencia", "no_acelera", "limitado_a_3000_rpm", "aceleracion_erratica", "cambios_bruscos", "se_apaga"],
            info: "LÓGICA: Doble señal de seguridad. Si no coinciden, la ECU ignora el pedal para evitar accidentes."
        },
        {
            nombre: "Válvula IAC (Actuador)",
            dtc: "P0505 - P0507",
            clave: ["check_engine","se_apaga_al_detener","enciende_normal_luego_se_apaga","ralenti_inestable", "ralenti_bajo", "ralenti_alto", "rpm_altas", "se_apaga", "rpm_suben_y_bajan", "arranque_dificil", "falla_frio", "tiembla_en_parada", "apagones_intermitentes", "falla_al_encender_accesorios", "humo_negro"],
            info: "LÓGICA: Controla el aire en mínima. Si está sucia, las RPM oscilan o el motor se apaga al soltar el pedal."
        },
        {
           nombre: "Bobinas de Encendido (Actuador)",
           dtc: "P0350 - P0362",
           clave: ["check_engine","falla_intermitente","vibracion_se_disimula_al_acelerar","enciende_normal_luego_se_apaga","misfire", "sin_chispa", "no_arranca", "jalonea", "perdida_potencia", "tiembla_en_parada", "explosiones_escape", "se_apaga", "falla_caliente", "falla_lluvia_humedad", "respuesta_lenta_acelerador", "consumo_alto", "falla_en_subida"],
           info: "LÓGICA: Transforma 12V en alta tensión. Si falla, el cilindro queda muerto y la potencia cae notablemente al subir."
        },
        {
            nombre: "Convertidor Catalítico",
            dtc: "P0420 - P0430",
            clave: ["check_engine","falla_en_subida","perdida_potencia", "no_acelera", "se_ahoga", "modo_emergencia", "limitado_a_3000_rpm", "consume_mucho", "sobrecalentamiento", "olor_a_huevo_podrido", "ruido_metalico", "falta_de_fuerza_progresiva", "misfire"],
            info: "LÓGICA: Obstrucción. Si pierde fuerza subiendo o huele a azufre, la contrapresión está ahogando al motor."
        },
        {
            nombre: "Sensor de Presión de Aceite",
            dtc: "P0520 - P0523",
            clave: ["luz_aceite_encendida", "presion_aceite_baja", "zumbido_motor", "ruido_bielas", "falla_levas", "testigo_rojo", "marca_erratico", "sin_presion"],
            info: "LÓGICA: Mide la fuerza con la que circula el aceite. Si falla o hay baja presión, se enciende la luz roja y puede causar daño grave al motor por falta de lubricación."
        }
   ];
const contenedorSintomas = document.getElementById("sintomas_container");

listaSintomas.sort().forEach(s => {
    const div = document.createElement("label");
    div.className = "sintoma-item text-capitalize";
    div.innerHTML = `
        <input type="checkbox" value="${s}">
        ${s.replaceAll("_", " ")}
    `;
    contenedorSintomas.appendChild(div);
});

/* ================= LÓGICA DE DIAGNÓSTICO (SUMA) ================= */
/* ================= LÓGICA DE DIAGNÓSTICO (TOP 2) ================= */
function diagnosticar() {

    const seleccionados = [...document.querySelectorAll("input:checked")]
        .map(x => x.value);

    const resultContainer = document.getElementById("resultado_container");

    if (seleccionados.length === 0) {

        resultContainer.innerHTML = `
            <div class='alert alert-warning'>
                Por favor, seleccione al menos un síntoma.
            </div>
        `;

        return;
    }

    let resultados = [];

    sensores.forEach(s => {

        let puntos = 0;
        let coincidencias = [];

        seleccionados.forEach(sel => {

            if (s.clave.includes(sel)) {

                puntos++;

                coincidencias.push(
                    sel.replaceAll("_", " ")
                );

            }

        });

        // SOLO GUARDAR SI COINCIDE
        if (puntos > 0) {

            resultados.push({
                ...s,
                puntos,
                coincidencias
            });

        }

    });

    // OBTENER EL MAYOR PUNTAJE
    const maxPuntos = Math.max(...resultados.map(r => r.puntos));

    // SOLO MOSTRAR LOS QUE TIENEN EL MAYOR PUNTAJE
    resultados = resultados.filter(r => r.puntos === maxPuntos);

    let html = "";

    if (resultados.length === 0) {

        html = `
            <div class='alert alert-danger'>
                No se encontraron coincidencias.
            </div>
        `;

    } else {

        html = `
            <h5 class="text-info mb-3">
                Principales sospechosos:
            </h5>
        `;

        resultados.forEach(r => {

            html += `
                <div class="sensor-card"
                     style="border-left:6px solid #00ffcc">

                    <span class="puntaje-badge">
                        ${r.puntos} Coincidencias
                    </span>

                    <h4>${r.nombre}</h4>

                    <div class="codigo-dtc">
                        Posibles DTC: ${r.dtc}
                    </div>

                    <div class="match-list">

                        <strong>Coincidencias:</strong><br>

                        ${r.coincidencias.map(c => `
                            <span>${c}</span>
                        `).join("")}

                    </div>

                    <pre>${r.info}</pre>

                </div>
            `;

        });

    }

    resultContainer.innerHTML = html;
}
</script>

</body>
</html>
