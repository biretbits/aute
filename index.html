<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Profesional Automotriz AUTEMEC</title>

    <!-- BOOTSTRAP 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0e0f13;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header-info {
            background: #1b1f27;
            padding: 15px;
            border-bottom: 3px solid #00cc88;
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            color: #00ffcc;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .panel {
            background: #1b1f27;
            border-radius: 12px;
            padding: 20px;
            height: 75vh;
            overflow-y: auto;
            border: 1px solid #333;
        }

        /* Personalización de Checkboxes */
        .sintoma-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #2a2e35;
            transition: 0.3s;
            cursor: pointer;
        }

        .sintoma-item:hover {
            background: #252a34;
        }

        .sintoma-item input {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: #00cc88;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 204, 136, 0.3);
            transition: 0.3s;
        }

        button:hover {
            background: #00ffaa;
            transform: translateY(-2px);
        }

        /* Tarjetas de Resultados */
        .sensor-card {
            background: #222;
            margin-bottom: 20px;
            padding: 18px;
            border-radius: 12px;
            position: relative;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .puntaje-badge {
            background: #ff3366;
            color: white;
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: bold;
            float: right;
        }

        .codigo-dtc {
            color: #ffcc00;
            font-family: monospace;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .match-list span {
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 5px;
            display: inline-block;
            margin-top: 5px;
        }

        pre {
            white-space: pre-wrap;
            background: #111;
            color: #ccc;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            border: 1px solid #333;
            margin-top: 10px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header-info">
    <h1>SISTEMA AUTEMEC PRO</h1>
    <h5>Ing. Limbert Lipiri Villca</h5>
    <p class="mb-0 text-secondary">Challapata, Bolivia - Calle La Paz entre Pasaje Linares</p>
</div>

<div class="container-fluid px-4">
    <div class="row g-4">
        <!-- SECCIÓN DE SÍNTOMAS -->
        <div class="col-12 col-lg-5">
            <div class="panel">
                <h4 class="text-info border-bottom pb-2">Selección de Síntomas</h4>
                <div id="sintomas_container"></div>
            </div>
            <button onclick="diagnosticar()">INICIAR DIAGNÓSTICO</button>
        </div>

        <!-- SECCIÓN DE RESULTADOS -->
        <div class="col-12 col-lg-7">
            <div class="panel">
                <h4 class="text-info border-bottom pb-2">Resultados del Análisis</h4>
                <div id="resultado_container">
                    <p class="text-center text-secondary mt-5">Marque los síntomas del vehículo para ver posibles fallas.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/* ================= LISTA DE SÍNTOMAS ================= */
/* ================= LISTA DE SÍNTOMAS ACTUALIZADA (PRO) ================= */
const listaSintomas = [
    // Arranque y Apagado
    "no_arranca", "arranque_largo", "se_apaga", "apagones_intermitentes",

    // Marcha y Potencia
    "jalonea", "perdida_potencia", "no_acelera", "modo_emergencia",
    "falla_en_subida", "tironea_acelerando", "se_ahoga", "cascabelea",

    // Ralentí (Marcha mínima)
    "ralenti_inestable", "ralenti_alto", "ralenti_bajo", "rpm_altas", "vibra_mucho",

    // Humos y Olores
    "humo_negro", "humo_azul", "olor_gasolina", "olor_quemado",

    // Mezcla y Consumo
    "consume_mucho", "consumo_excesivo_combustible", "mezcla_pobre", "mezcla_rica",

    // Temperatura y Eléctrico
    "falla_frio", "falla_caliente", "sobrecalentamiento", "ventilador_prendido",
    "voltaje_5v", "senal_inestable", "tablero_loco",

    // Explosiones y Presión
    "explosiones_escape", "explosiones_admision",
    "baja_presion_combustible", "alta_presion_combustible",

    // Sensores Específicos / Tablero
    "tacometro_no", "velocimetro_falla", "caja_golpea", "abs_falla", "scanner_no_comunica",
    "sin_chispa", "sin_inyeccion"
];

/* ================= BASE DE DATOS (SENSORES Y ACTUADORES) ================= */
const sensores = [
    {
        nombre: "Sensor CKP (Cigüeñal)",
        dtc: "P0335 - P0339",
        clave: ["no_arranca", "sin_chispa", "sin_inyeccion", "tacometro_no", "se_apaga", "apagones_intermitentes", "arranque_largo"],
        info: "CLAVE MAESTRA: Aguja del tacómetro muerta. Si al dar arranque la aguja de RPM no sube ni un milímetro, el CKP no está enviando señal. Es la única falla que corta chispa y pulso al mismo tiempo."
    },
    {
        nombre: "Sensor CMP (Árbol de Levas)",
        dtc: "P0340 - P0343",
        clave: ["arranque_largo", "falla_caliente", "perdida_potencia", "modo_emergencia", "explosiones_escape", "jalonea"],
        info: "CLAVE MAESTRA: El motor arranca al segundo o tercer intento (Arranque largo). A diferencia del CKP, el CMP permite que el motor encienda usando una estrategia de emergencia tras varios giros."
    },
    {
        nombre: "Sensor MAF (Flujo de Aire)",
        dtc: "P0100 - P0104",
        clave: ["humo_negro", "consume_mucho", "se_ahoga", "jalonea", "ralenti_inestable", "mezcla_rica", "perdida_potencia", "tironea_acelerando", "explosiones_escape"],
        info: "CLAVE MAESTRA: Prueba de desconexión. Si el motor falla mucho y al desconectar el sensor el motor se empareja o estabiliza, el MAF está enviando una lectura falsa de peso de aire."
    },
    {
        nombre: "Sensor MAP (Presión Absoluta)",
        dtc: "P0105 - P0109",
        clave: ["falla_en_subida", "perdida_potencia", "consume_mucho", "humo_negro", "se_ahoga", "explosiones_admision", "mezcla_rica", "ralenti_bajo"],
        info: "CLAVE MAESTRA: Ahogamiento en carga. Si el auto acelera bien en vacío pero al subir una pendiente (en Challapata) hecha humo negro y pierde fuerza totalmente, el MAP no detecta la presión de carga."
    },
    {
        nombre: "Sensor TPS (Posición de Mariposa)",
        dtc: "P0120 - P0124",
        clave: ["no_acelera", "modo_emergencia", "rpm_altas", "tironea_acelerando", "caja_golpea", "ralenti_alto", "se_ahoga"],
        info: "CLAVE MAESTRA: El punto muerto del pedal. Si el tironeo ocurre siempre a la misma altura del pedal o el ralentí se queda alto porque el sensor no marca 0% de apertura (mariposa cerrada)."
    },
    {
        nombre: "Sensor ECT (Temperatura)",
        dtc: "P0115 - P0119",
        clave: ["falla_frio", "falla_caliente", "sobrecalentamiento", "ventilador_prendido", "consume_mucho", "ralenti_alto", "humo_negro", "arranque_largo", "consumo_excesivo_combustible"],
        info: "CLAVE MAESTRA: Ralentí alto con ventiladores locos. Si el motor está frío, se acelera solo y el ventilador enciende de inmediato, el ECT está informando una temperatura errónea (cortocircuito)."
    },
    {
        nombre: "Sonda Lambda (Sensor de Oxígeno)",
        dtc: "P0130 - P0172",
        clave: ["humo_negro", "mezcla_rica", "mezcla_pobre", "consume_mucho", "falla_caliente", "jalonea", "olor_gasolina", "consumo_excesivo_combustible"],
        info: "CLAVE MAESTRA: Falla tardía. El motor arranca perfecto y falla recién a los 3 o 5 minutos (cuando entra en Closed Loop). Si la falla es desde el primer segundo, no es la Sonda Lambda."
    },
    {
        nombre: "Knock Sensor (Detonación)",
        dtc: "P0325 - P0332",
        clave: ["cascabelea", "perdida_potencia", "falla_en_subida"],
        info: "CLAVE MAESTRA: Motor atrasado. Es la única falla que hace que el motor se sienta 'pesado' y sin avance, porque la ECU retarda el tiempo de encendido al máximo por seguridad."
    },
    {
        nombre: "Bomba / Presión de Combustible",
        dtc: "P0087 / P0190",
        clave: ["no_arranca", "baja_presion_combustible", "falla_en_subida", "tironea_acelerando", "arranque_largo", "se_apaga", "mezcla_pobre"],
        info: "CLAVE MAESTRA: Explosiones por la admisión. Cuando falta presión, la mezcla se vuelve tan pobre que la combustión se vuelve lenta y regresa por el múltiple de admisión al acelerar fuerte."
    },
    {
        nombre: "Bobinas / Sistema de Encendido",
        dtc: "P0350 - P0354",
        clave: ["vibra_mucho", "explosiones_escape", "jalonea", "sin_chispa", "perdida_potencia", "falla_caliente", "humo_azul"],
        info: "CLAVE MAESTRA: El jaloneo rítmico. A diferencia de un sensor, la falla de bobina es constante y se siente como un 'salto' en el motor cada vez que el cilindro afectado intenta trabajar."
    },
    {
        nombre: "Válvula IAC (Ralentí)",
        dtc: "P0505 - P0507",
        clave: ["ralenti_inestable", "se_apaga", "ralenti_alto", "ralenti_bajo", "rpm_altas", "vibra_mucho"],
        info: "CLAVE MAESTRA: Se apaga al soltar el pedal. Si el motor se apaga en cada esquina pero funciona bien si mantienes el pie un poquito en el acelerador, el paso de aire mínimo (IAC) está bloqueado."
    },
    {
        nombre: "Válvula EGR",
        dtc: "P0400 - P0406",
        clave: ["ralenti_inestable", "explosiones_admision", "se_apaga", "perdida_potencia", "humo_negro"],
        info: "CLAVE MAESTRA: Tiembla en ralentí, corre bien en alta. Si el motor parece que se va a desarmar en el semáforo pero en carretera no tiene ninguna falla, la EGR se quedó abierta metiendo escape al ralentí."
    },
    {
        nombre: "Válvula EVAP (Cánister)",
        dtc: "P0440 - P0443",
        clave: ["olor_gasolina", "arranque_largo", "ralenti_inestable", "mezcla_rica"],
        info: "CLAVE MAESTRA: Falla después de cargar gasolina. Si el auto se ahoga o tarda en encender justo después de llenar el tanque de combustible, la válvula de purga está dejando pasar vapores directos."
    }
];
/* ================= GENERAR CUESTIONARIO ================= */
const contenedorSintomas = document.getElementById("sintomas_container");

listaSintomas.sort().forEach(s => {
    const div = document.createElement("label");
    div.className = "sintoma-item text-capitalize";
    div.innerHTML = `
        <input type="checkbox" value="${s}">
        ${s.replaceAll("_", " ")}
    `;
    contenedorSintomas.appendChild(div);
});

/* ================= LÓGICA DE DIAGNÓSTICO (SUMA) ================= */
/* ================= LÓGICA DE DIAGNÓSTICO (TOP 2) ================= */
function diagnosticar() {
    const seleccionados = [...document.querySelectorAll("input:checked")].map(x => x.value);
    const resultContainer = document.getElementById("resultado_container");

    if (seleccionados.length === 0) {
        resultContainer.innerHTML = "<div class='alert alert-warning'>Por favor, seleccione al menos un síntoma.</div>";
        return;
    }

    let resultados = [];

    sensores.forEach(s => {
        let puntos = 0;
        let coincidencias = [];

        seleccionados.forEach(sel => {
            if (s.clave.includes(sel)) {
                puntos++; // SUMAR PUNTO
                coincidencias.push(sel.replaceAll("_", " "));
            }
        });

        if (puntos > 0) {
            resultados.push({ ...s, puntos, coincidencias });
        }
    });

    // 1. Ordenar de mayor a menor puntaje
    resultados.sort((a, b) => b.puntos - a.puntos);

    // 2. FILTRAR: Tomar solo los 2 primeros (los más votados)
    const topResultados = resultados.slice(0, 2);

    // Renderizar
    let html = "";
    if (topResultados.length === 0) {
        html = "<div class='alert alert-danger'>No se encontraron coincidencias. Revise fallas mecánicas (compresión/tiempo).</div>";
    } else {
        // Mensaje que indica que se muestran los resultados principales
        html = `<h5 class="text-info mb-3">Principales Sospechosos (Top 2):</h5>`;

        topResultados.forEach(r => {
            const colorBorde = r.puntos >= 3 ? "#00ffcc" : (r.puntos >= 2 ? "#ffcc00" : "#666");

            html += `
                <div class="sensor-card" style="border-left: 6px solid ${colorBorde}">
                    <span class="puntaje-badge">${r.puntos} Ptos</span>
                    <h4>${r.nombre}</h4>
                    <div class="codigo-dtc">Posibles DTC: ${r.dtc}</div>

                    <div class="match-list">
                        <strong>Coincidencias:</strong><br>
                        ${r.coincidencias.map(c => `<span>${c}</span>`).join("")}
                    </div>

                    <pre>${r.info}</pre>
                </div>
            `;
        });
    }
    resultContainer.innerHTML = html;
}
</script>

</body>
</html>
