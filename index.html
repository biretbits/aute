<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Profesional Automotriz AUTEMEC</title>

    <!-- BOOTSTRAP 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0e0f13;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header-info {
            background: #1b1f27;
            padding: 15px;
            border-bottom: 3px solid #00cc88;
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            color: #00ffcc;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .panel {
            background: #1b1f27;
            border-radius: 12px;
            padding: 20px;
            height: 75vh;
            overflow-y: auto;
            border: 1px solid #333;
        }

        /* Personalización de Checkboxes */
        .sintoma-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #2a2e35;
            transition: 0.3s;
            cursor: pointer;
        }

        .sintoma-item:hover {
            background: #252a34;
        }

        .sintoma-item input {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: #00cc88;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 204, 136, 0.3);
            transition: 0.3s;
        }

        button:hover {
            background: #00ffaa;
            transform: translateY(-2px);
        }

        /* Tarjetas de Resultados */
        .sensor-card {
            background: #222;
            margin-bottom: 20px;
            padding: 18px;
            border-radius: 12px;
            position: relative;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .puntaje-badge {
            background: #ff3366;
            color: white;
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: bold;
            float: right;
        }

        .codigo-dtc {
            color: #ffcc00;
            font-family: monospace;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .match-list span {
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 5px;
            display: inline-block;
            margin-top: 5px;
        }

        pre {
            white-space: pre-wrap;
            background: #111;
            color: #ccc;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            border: 1px solid #333;
            margin-top: 10px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header-info">
    <h1>SISTEMA AUTEMEC PRO</h1>
    <h5>Ing. Limbert Lipiri Villca</h5>
    <p class="mb-0 text-secondary">Challapata, Bolivia - Calle La Paz entre Pasaje Linares</p>
</div>

<div class="container-fluid px-4">
    <div class="row g-4">
        <!-- SECCIÓN DE SÍNTOMAS -->
        <div class="col-12 col-lg-5">
            <div class="panel">
                <h4 class="text-info border-bottom pb-2">Selección de Síntomas</h4>
                <div id="sintomas_container"></div>
            </div>
            <button onclick="diagnosticar()">INICIAR DIAGNÓSTICO</button>
        </div>

        <!-- SECCIÓN DE RESULTADOS -->
        <div class="col-12 col-lg-7">
            <div class="panel">

                <h4 class="text-info border-bottom pb-2">Resultados del Análisis</h4>
                <div class="container">
                  Nota: vibrar es mas fuerte y temblor es mas suave y habeses ni se nota
                </div>
                <div id="resultado_container">
                    <p class="text-center text-secondary mt-5">Marque los síntomas del vehículo para ver posibles fallas.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>const listaSintomas = [
    "no_arranca",
    "arranque_largo",
    "arranque_dificil",
    "se_apaga",
    "apagones_intermitentes",
    "jalonea",
    "perdida_potencia",
    "motor_perezoso",
    "no_acelera",
    "modo_emergencia",
    "falla_en_subida",
    "tironea_acelerando",
    "se_ahoga",
    "cascabelea",
    "tiembla_en_recorrido",
    "vibra_en_recorrido",
    "limitado_a_3000_rpm",
    "ralenti_inestable",
    "ralenti_alto",
    "ralenti_bajo",
    "rpm_altas",
    "rpm_suben_y_bajan",
    "rpm_en_0",
    "vibra_mucho",
    "motor_cabecea",
    "tiembla_en_parada",
    "humo_negro",
    "olor_gasolina",
    "consume_mucho",
    "mezcla_pobre",
    "mezcla_rica",
    "falla_frio",
    "falla_caliente",
    "sobrecalentamiento",
    "ventilador_prendido",
    "electroventilador_no_activa",
    "electroventilador_siempre_activo",
    "temperatura_tablero_erratica",
    "explosiones_escape",
    "explosiones_admision",
    "baja_presion_combustible",
    "alta_presion_combustible",
    "presion_aceite_baja",
    "tacometro_no",
    "velocimetro_falla",
    "caja_golpea",
    "sin_chispa",
    "sin_inyeccion",
    "misfire",
    "senal_erratica",
    "sincronizacion_perdida",
    "sincronizacion_acelerador",
    "falla_aceleracion",
    "respuesta_lenta_acelerador",
    "pedal_no_responde",
    "avance_atrasado",
    "convertidor_sobrecalentado",
    "codigo_correlacion_pedal",
    "no_mejora_al_acelerar",
    "mejora_al_acelerar",
    "vibra_mucho", "vibracion_ritmica",
];
/* ==========================================================================
   BASE DE DATOS MAESTRA: AUTEMEC PRO - EDICIÓN DINÁMICA
   ========================================================================== */
   const sensores = [
     // --- GRUPO 1: SINCRONIZACIÓN Y TIEMPO ---
     {
         nombre: "Sensor CKP (Cigüeñal)",
         dtc: "P0335 - P0338",
         clave: ["vibra_mucho","no_mejora_al_acelerar","no_arranca", "sin_chispa", "sin_inyeccion", "tacometro_no", "se_apaga", "apagones_intermitentes", "falla_caliente", "jaloneos", "senal_erratica", "arranque_largo"],
         info: "LÓGICA: Si falla, la ECU no sabe que el motor gira. El tacómetro en 0 mientras das marcha es la prueba reina."
     },
     {
         nombre: "Sensor CMP (Árbol de Levas)",
         dtc: "P0340 - P0344",
         clave: ["no_mejora_al_acelerar","arranque_largo", "perdida_potencia", "explosiones_escape", "no_arranca", "jalonea", "misfire", "ralenti_inestable", "falla_caliente", "sincronizacion_perdida", "consumo_alto", "arranque_dificil", "modo_seguro"],
         info: "LÓGICA: Sincroniza la secuencia de inyección. Sin él, la ECU 'adivina' el tiempo, causando arranques de 5-10 segundos."
     },

     // --- GRUPO 2: FLUJO Y PRESIÓN DE AIRE ---
     {
         nombre: "Sensor MAF (Flujo de Aire)",
         dtc: "P0100 - P0104",
         clave: ["vibra_mucho","mejora_al_acelerar","tiembla_en_recorrido", "humo_negro", "jalonea", "se_ahoga", "mezcla_pobre", "mezcla_rica", "perdida_potencia", "consumo_alto", "ralenti_inestable", "apagones", "arranque_dificil", "respuesta_lenta_acelerador", "falla_aceleracion"],
         info: "LÓGICA: Mide el peso del aire. Si está sucio, subestima el aire y el motor vacila por falta de gasolina en crucero."
     },
     {
         nombre: "Sensor MAP (Presión Absoluta)",
         dtc: "P0105 - P0109",
         clave: ["vibra_mucho","vibra_en_recorrido", "falla_en_subida", "motor_cabecea", "explosiones_admision", "mezcla_rica", "mezcla_pobre", "perdida_potencia", "jaloneos", "ralenti_inestable", "consumo_alto", "humo_negro", "arranque_dificil", "se_apaga", "falla_aceleracion", "respuesta_lenta_acelerador", "modo_seguro"],
         info: "LÓGICA: Mide el vacío. Es vital para calcular el avance del encendido cuando el motor hace fuerza (subidas)."
     },
     {
         nombre: "Sensor IAT (Temperatura de Aire)",
         dtc: "P0110 - P0113",
         clave: ["falla_frio", "consume_mucho", "mezcla_rica", "arranque_largo", "humo_negro", "ralenti_inestable", "perdida_potencia", "falla_aceleracion", "respuesta_lenta_acelerador", "mezcla_pobre", "jaloneos", "arranque_dificil", "se_ahoga"],
         info: "LÓGICA: El aire frío es más denso. Si el sensor marca siempre calor, la ECU no enriquecerá la mezcla y el auto fallará en frío."
     },

     // --- GRUPO 3: COMBUSTIBLE Y PRESIÓN ---
     {
         nombre: "Sensor FRP (Presión del Riel)",
         dtc: "P0190 - P0193",
         clave: ["alta_presion_combustible", "baja_presion_combustible", "modo_emergencia", "jalonea", "no_arranca", "arranque_largo", "perdida_potencia", "se_apaga", "ralenti_inestable", "humo_negro", "mezcla_pobre", "mezcla_rica", "falla_aceleracion", "respuesta_lenta_acelerador", "misfire", "consumo_alto"],
         info: "LÓGICA: El vigía de la inyección directa/common rail. Si reporta sobrepresión, la ECU corta potencia para evitar roturas."
     },
     {
         nombre: "Inyectores de Combustible (Actuador)",
         dtc: "P0200 - P0204",
         clave: ["vibra_mucho", "vibracion_ritmica","vibra_en_recorrido", "tiembla_en_parada", "olor_gasolina", "humo_negro", "sin_inyeccion", "misfire", "jaloneos", "perdida_potencia", "consume_mucho", "arranque_dificil", "no_arranca", "ralenti_inestable", "explosiones_escape", "mezcla_rica", "mezcla_pobre", "se_apaga", "motor_cabecea"],
         info: "LÓGICA: Fallo de entrega. Si un inyector gotea, hay humo negro; si no abre, el motor vibra por cilindro muerto."
     },
     {
         nombre: "Bomba de Combustible (Actuador)",
         dtc: "P0087",
         clave: ["no_mejora_al_acelerar","baja_presion_combustible", "vibra_en_recorrido", "falla_en_subida", "se_apaga", "perdida_potencia", "jaloneos", "arranque_largo", "no_arranca", "falla_aceleracion", "motor_cabecea", "se_ahoga", "ralenti_inestable", "apagones_intermitentes", "respuesta_lenta_acelerador", "misfire"],
         info: "LÓGICA: Falta de caudal. En alta demanda (subida), la presión cae y el motor vibra por hambre de combustible."
     },

     // --- GRUPO 4: TEMPERATURA Y DETONACIÓN ---
     {
         nombre: "Sensor ECT (Temperatura Refrigerante)",
         dtc: "P0115 - P0119",
         clave: ["falla_frio", "falla_caliente", "sobrecalentamiento", "ventilador_prendido", "consume_mucho", "arranque_dificil", "arranque_largo", "humo_negro", "mezcla_rica", "ralenti_inestable", "se_apaga", "perdida_potencia", "falla_aceleracion", "temperatura_tablero_erratica", "electroventilador_no_activa", "electroventilador_siempre_activo"],
         info: "LÓGICA: Es el 'estrangulador' electrónico. Si marca siempre frío, el auto se ahoga en gasolina cuando ya calentó."
     },
     {
         nombre: "Sensor de Detonación (Knock)",
         dtc: "P0325",
         clave: ["cascabelea", "perdida_potencia", "falla_en_subida", "jaloneos", "motor_perezoso", "consumo_alto", "explosiones_admision", "explosiones_escape", "avance_atrasado", "modo_seguro", "falla_aceleracion", "respuesta_lenta_acelerador", "temperatura_alta_motor"],
         info: "LÓGICA: Escucha el picado de bielas. Si falla, la ECU no retrasa el tiempo y escuchas el sonido metálico (metralla)."
     },

     // --- GRUPO 5: GASES Y EMISIONES ---
     {
         nombre: "Sonda Lambda (Oxígeno)",
         dtc: "P0130 - P0172",
        clave: ["tiembla_en_recorrido", "consume_mucho", "mezcla_rica", "olor_gasolina", "falla_caliente", "mezcla_pobre", "humo_negro", "ralenti_inestable", "jaloneos", "perdida_potencia", "falla_aceleracion", "respuesta_lenta_acelerador", "explosiones_escape", "arranque_dificil", "se_apaga", "convertidor_sobrecalentado"],
         info: "LÓGICA: Corrige la mezcla en tiempo real. Si se vuelve lenta, causa un vaivén rítmico de potencia (Surging)."
     },
     {
         nombre: "Válvula EGR (Actuador)",
         dtc: "P0400 - P0406",
         clave: ["tiembla_en_parada", "se_apaga", "explosiones_admision", "humo_negro", "ralenti_inestable", "perdida_potencia", "jaloneos", "falla_aceleracion", "motor_cabecea", "mezcla_pobre", "mezcla_rica", "consumo_alto", "falla_en_subida", "arranque_dificil", "se_ahoga", "modo_seguro"],
         info: "LÓGICA: Si se traba abierta, introduce gases quemados en ralentí, asfixiando la combustión."
     },

     // --- GRUPO 6: POSICIÓN Y MARIPOSA ---
     {
         nombre: "Sensor TPS (Posición de Mariposa)",
         dtc: "P0120 - P0124",
         clave: ["vibra_mucho","no_acelera", "tironea_acelerando", "jalonea", "rpm_altas", "caja_golpea", "ralenti_inestable", "respuesta_lenta_acelerador", "falla_aceleracion", "modo_seguro", "se_apaga", "aceleracion_erratica", "cambios_bruscos", "perdida_potencia", "arranque_dificil", "motor_cabecea", "sincronizacion_acelerador"],
         info: "LÓGICA: Informa cuánto abriste el aire. Si tiene un 'punto muerto', el auto dará un tirón violento al pasar por ese grado de apertura."
     },
     {
         nombre: "Sensor APP (Pedal Acelerador)",
         dtc: "P2120",
         clave: ["pedal_no_responde", "modo_emergencia", "no_acelera", "limitado_a_3000_rpm", "respuesta_lenta_acelerador", "aceleracion_erratica", "jalonea", "perdida_potencia", "ralenti_inestable", "se_apaga", "falla_aceleracion", "sincronizacion_acelerador", "cambios_bruscos", "motor_perezoso", "codigo_correlacion_pedal"],
         info: "LÓGICA: Doble señal de seguridad. Si los dos voltajes internos no coinciden, la ECU ignora el pedal para evitar accidentes."
     },
     {
         nombre: "Válvula IAC (Actuador)",
         dtc: "P0505 - P0507",
         clave: ["vibra_mucho","mejora_al_acelerar","ralenti_inestable", "ralenti_bajo", "ralenti_alto", "se_apaga", "rpm_suben_y_bajan", "arranque_dificil", "falla_frio", "motor_tiembla", "se_ahoga", "apagones_intermitentes", "aceleracion_inestable", "consume_mucho", "falla_al_encender_accesorios", "motor_cabecea", "ralenti_oscilante"],
         info: "LÓGICA: Controla el aire en mínima. Si está sucia, las RPM oscilarán o el motor se apagará al soltar el pedal."
     },
     {
    nombre: "Bobinas de Encendido (Actuador)",
    dtc: "P0350 - P0362",
    clave: ["vibra_mucho", "vibracion_ritmica","no_mejora_al_acelerar",
        "misfire",
        "sin_chispa",
        "no_arranca",
        "jalonea",
        "perdida_potencia",
        "motor_cabecea",
        "tiembla_en_parada",
        "explosiones_escape",
        "humo_negro",
        "consume_mucho",
        "se_apaga",
        "arranque_dificil",
        "falla_caliente",
        "ralenti_inestable",
        "falla_aceleracion"
    ],
    info: "LÓGICA: La bobina transforma 12V en miles de voltios para generar chispa. Si falla una bobina, el cilindro queda muerto provocando misfire, vibración y pérdida de potencia. Cuando se calienta puede abrirse internamente y causar apagones o falla intermitente."
}
 ];
const contenedorSintomas = document.getElementById("sintomas_container");

listaSintomas.sort().forEach(s => {
    const div = document.createElement("label");
    div.className = "sintoma-item text-capitalize";
    div.innerHTML = `
        <input type="checkbox" value="${s}">
        ${s.replaceAll("_", " ")}
    `;
    contenedorSintomas.appendChild(div);
});

/* ================= LÓGICA DE DIAGNÓSTICO (SUMA) ================= */
/* ================= LÓGICA DE DIAGNÓSTICO (TOP 2) ================= */
function diagnosticar() {

    const seleccionados = [...document.querySelectorAll("input:checked")]
        .map(x => x.value);

    const resultContainer = document.getElementById("resultado_container");

    if (seleccionados.length === 0) {

        resultContainer.innerHTML = `
            <div class='alert alert-warning'>
                Por favor, seleccione al menos un síntoma.
            </div>
        `;

        return;
    }

    let resultados = [];

    sensores.forEach(s => {

        let puntos = 0;
        let coincidencias = [];

        seleccionados.forEach(sel => {

            if (s.clave.includes(sel)) {

                puntos++;

                coincidencias.push(
                    sel.replaceAll("_", " ")
                );

            }

        });

        // SOLO GUARDAR SI COINCIDE
        if (puntos > 0) {

            resultados.push({
                ...s,
                puntos,
                coincidencias
            });

        }

    });

    // OBTENER EL MAYOR PUNTAJE
    const maxPuntos = Math.max(...resultados.map(r => r.puntos));

    // SOLO MOSTRAR LOS QUE TIENEN EL MAYOR PUNTAJE
    resultados = resultados.filter(r => r.puntos === maxPuntos);

    let html = "";

    if (resultados.length === 0) {

        html = `
            <div class='alert alert-danger'>
                No se encontraron coincidencias.
            </div>
        `;

    } else {

        html = `
            <h5 class="text-info mb-3">
                Principales sospechosos:
            </h5>
        `;

        resultados.forEach(r => {

            html += `
                <div class="sensor-card"
                     style="border-left:6px solid #00ffcc">

                    <span class="puntaje-badge">
                        ${r.puntos} Coincidencias
                    </span>

                    <h4>${r.nombre}</h4>

                    <div class="codigo-dtc">
                        Posibles DTC: ${r.dtc}
                    </div>

                    <div class="match-list">

                        <strong>Coincidencias:</strong><br>

                        ${r.coincidencias.map(c => `
                            <span>${c}</span>
                        `).join("")}

                    </div>

                    <pre>${r.info}</pre>

                </div>
            `;

        });

    }

    resultContainer.innerHTML = html;
}
</script>

</body>
</html>
